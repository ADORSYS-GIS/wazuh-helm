{{- if and .Values.indexer.s3Snapshot .Values.indexer.s3Snapshot.enabled
         .Values.indexer.s3Snapshot.register .Values.indexer.s3Snapshot.register.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.fullname" $ }}-s3-snapshot-register-script
  namespace: {{ include "common.names.namespace" $ }}
  annotations:
    ## Created before the register Job (weight 1 < weight 3) so the script
    ## is available when the Job pod starts.
    "helm.sh/hook": "post-install,post-upgrade"
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    {{- include "common.annotations.standard" ( dict "customAnnotations" (dict) "context" $ ) | nindent 4 }}
  labels:
    {{- include "common.labels.standard" ( dict "customLabels" (dict) "context" $ ) | nindent 4 }}
data:
  "s3-snapshot-register.sh": |
    {{ $.Files.Get "files/scripts/s3-snapshot-register.sh" | nindent 4 }}
{{- end }}
