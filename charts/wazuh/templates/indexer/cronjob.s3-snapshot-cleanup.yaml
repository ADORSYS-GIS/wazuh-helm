{{- if and .Values.indexer.s3Snapshot .Values.indexer.s3Snapshot.enabled
         .Values.indexer.s3Snapshot.cleanup .Values.indexer.s3Snapshot.cleanup.enabled }}
{{- with .Values.indexer.s3Snapshot }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "common.names.fullname" $ }}-indexer-s3-snapshot-cleanup
  namespace: {{ include "common.names.namespace" $ }}
  annotations:
    {{- include "common.annotations.standard" ( dict "customAnnotations" (dict) "context" $ ) | nindent 4 }}
  labels:
    {{- include "common.labels.standard" ( dict "customLabels" (dict) "context" $ ) | nindent 4 }}
spec:
  schedule: {{ .cleanup.schedule | default "0 3 * * *" | quote }}
  ## Prevent overlapping cleanup runs. If a previous run is still active when
  ## the next trigger fires, skip it rather than launching a second concurrent job.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .cleanup.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .cleanup.failedJobsHistoryLimit | default 1 }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "common.labels.standard" ( dict "customLabels" (dict) "context" $ ) | nindent 12 }}
            app: {{ include "common.names.fullname" $ }}-indexer-s3-snapshot-cleanup
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: s3-snapshot-cleanup-script
              configMap:
                name: {{ include "common.names.fullname" $ }}-s3-snapshot-cleanup-script
                defaultMode: 0444
          containers:
            - name: s3-snapshot-cleanup
              image: {{ printf "%s/%s:%s" .cleanup.image.registry .cleanup.image.repository .cleanup.image.tag | quote }}
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/s3-snapshot-cleanup.sh
              env:
                - name: OPENSEARCH_URL
                  value: "https://{{ include "common.names.fullname" $ }}-indexer-api:9200"
                - name: SNAPSHOT_REPOSITORY
                  value: {{ .repository | default "s3-repo" | quote }}
                - name: RETENTION_DAYS
                  value: {{ .cleanup.retentionDays | default 30 | quote }}
                - name: OPENSEARCH_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "secret.indexer-auth" $ }}
                      key: INDEXER_USERNAME
                - name: OPENSEARCH_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "secret.indexer-auth" $ }}
                      key: INDEXER_PASSWORD
              volumeMounts:
                - name: s3-snapshot-cleanup-script
                  mountPath: /scripts/s3-snapshot-cleanup.sh
                  subPath: s3-snapshot-cleanup.sh
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 64Mi
{{- end }}
{{- end }}
