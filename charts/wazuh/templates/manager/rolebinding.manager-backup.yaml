{{- if and .Values.master .Values.master.backup .Values.master.backup.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "common.names.fullname" $ }}-manager-backup-binding
  namespace: {{ include "common.names.namespace" $ }}
  annotations:
    {{- include "common.annotations.standard" ( dict "customAnnotations" (dict) "context" $ ) | nindent 4 }}
  labels:
    {{- include "common.labels.standard" ( dict "customLabels" (dict) "context" $ ) | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "common.names.fullname" $ }}-manager-backup
    namespace: {{ include "common.names.namespace" $ }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "common.names.fullname" $ }}-manager-backup-role
{{- end }}
